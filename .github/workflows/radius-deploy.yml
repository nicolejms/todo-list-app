name: Radius - Deploy Application

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'GitHub Environment name'
        required: true
        default: 'dev'

permissions:
  id-token: write
  contents: read

env:
  APP_FILE: .radius/app.bicep

jobs:
  deploy:
    name: Deploy with Radius
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment || 'dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Verify AWS identity
        run: |
          echo "Verifying AWS credentials..."
          aws sts get-caller-identity
          echo "AWS authentication successful"

      - name: Connect to EKS cluster
        run: |
          echo "Connecting to EKS cluster: ${{ vars.RADIUS_K8S_CLUSTER }}"
          aws eks update-kubeconfig \
            --region "${{ vars.AWS_REGION }}" \
            --name "${{ vars.RADIUS_K8S_CLUSTER }}" \
            --kubeconfig "$HOME/.kube/target-cluster"
          echo "Connected to EKS cluster"
          KUBECONFIG="$HOME/.kube/target-cluster" kubectl get nodes

      - name: Install k3d
        run: |
          curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
          k3d version

      - name: Create ephemeral control plane cluster
        run: |
          k3d cluster create radius-cp \
            --no-lb \
            --k3s-arg "--disable=traefik@server:0" \
            --wait
          k3d kubeconfig get radius-cp > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"
          echo "Ephemeral control plane cluster ready"
          kubectl get nodes

      - name: Install rad CLI
        run: |
          curl -fsSL "https://raw.githubusercontent.com/radius-project/radius/main/deploy/install.sh" | bash
          rad version

      - name: Install Radius on control plane
        run: |
          rad install kubernetes --set rp.publicEndpointOverride=localhost
          echo "Waiting for Radius to be ready..."
          kubectl rollout status deployment/applications-rp -n radius-system --timeout=120s
          kubectl rollout status deployment/ucp -n radius-system --timeout=120s
          echo "Radius control plane is ready"

      - name: Create Radius environment
        run: |
          rad group create default
          rad env create ${{ inputs.environment }} \
            --group default \
            --namespace default
          rad env update ${{ inputs.environment }} \
            --group default \
            --aws-region "${{ vars.AWS_REGION }}" \
            --aws-account-id "${{ vars.AWS_ACCOUNT_ID }}"
          echo "Radius environment '${{ inputs.environment }}' configured"

      - name: Deploy application
        run: |
          echo "Deploying application..."
          echo "  File: ${{ env.APP_FILE }}"
          echo "  Environment: ${{ inputs.environment }}"
          rad deploy "${{ env.APP_FILE }}" \
            --environment ${{ inputs.environment }} \
            --group default
          echo "Deployment complete!"

      - name: Show application status
        if: always()
        run: |
          echo "Application status:"
          rad app list --group default 2>/dev/null || true
          echo ""
          echo "Resources:"
          rad resource list --group default 2>/dev/null || true

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "Radius system logs:"
          kubectl logs -n radius-system -l app.kubernetes.io/part-of=radius --tail=100 2>/dev/null || true
          echo ""
          echo "UCP logs:"
          kubectl logs -n radius-system -l app.kubernetes.io/name=ucp --tail=50 2>/dev/null || true

      - name: Cleanup k3d cluster
        if: always()
        run: |
          k3d cluster delete radius-cp 2>/dev/null || true